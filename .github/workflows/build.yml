name: Build Debug APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:        # lets you trigger manually from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout source ──────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Java 17 ──────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── 3. Cache Gradle deps (saves bandwidth on every run) ─────────────────
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      # ── 4. Grant execute permission ─────────────────────────────────────────
      - name: Make gradlew executable
        run: chmod +x gradlew

      # ── 5. Regenerate Wrapper (Clean & Safe Version) ────────────────────────
      - name: Regenerate Gradle Wrapper
        run: gradle :wrapper

      # ── 6. Build ─────────────────────────────────────────────────────────────
      - name: Build Debug APK
        env:
          JDK_JAVA_OPTIONS: "-Xmx2048m -Xms512m"
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      # ── 7. Upload APK as artifact ───────────────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ethio-ussd-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # ── 8. Print APK size ────────────────────────────────────────────────────
      - name: APK size
        run: |
          APK=app/build/outputs/apk/debug/app-debug.apk
          if [ -f "$APK" ]; then
            echo "APK size: $(du -sh $APK | cut -f1)"
          else
            echo "APK not found — build may have failed"
            exit 1
          fi
